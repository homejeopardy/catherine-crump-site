<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Catherine Crump monogram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#003a72"/>
      <stop offset="1" stop-color="#002247"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>
  <!-- two interlocking C's drawn as arcs (no font dependency) -->
  <g fill="none" stroke="#fdb515" stroke-width="6" stroke-linecap="round">
    <path d="M30 20 A13 13 0 1 0 30 44"/>
    <path d="M41 20 A13 13 0 1 0 41 44"/>
  </g>
  <!-- gold baseline rule motif -->
  <rect x="16" y="52" width="32" height="3" rx="1.5" fill="#fdb515" opacity="0.85"/>
</svg>
